<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>小耳 · 五馆 · 粒子选择</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👂</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Cutive+Mono&family=Noto+Serif+SC:wght@300;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: #000;
    color: #fff;
    font-family: "Cutive Mono", monospace;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(40, 30, 70, 0.35), transparent 70%),
      #050308;
    z-index: 0; pointer-events: none;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 78% 14%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 34% 76%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 88% 70%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 56% 88%, rgba(255,255,255,0.3), transparent);
    z-index: 0; pointer-events: none;
    opacity: 0.6;
  }

  #c {
    position: fixed; inset: 0;
    z-index: 1;
    cursor: grab;
  }
  html.dragging #c { cursor: grabbing; }
  #c.committed { cursor: pointer; }

  /* ─── Top mark ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 36px;
    z-index: 10; pointer-events: none;
  }
  nav .mark {
    font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 500;
    font-size: 20px; letter-spacing: 0.06em;
    text-shadow: 0 0 24px rgba(255,255,255,0.3);
  }
  nav .mark .ear { margin-right: 6px; }
  nav .mark::before { content: "·"; margin-right: 8px; opacity: 0.6; }
  nav .meta {
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  /* ─── Centre label (the room name) ─── */
  .centre-label {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, calc(-50% - 220px));
    z-index: 5;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .centre-label.dim { opacity: 0.35; }
  .centre-label .num {
    font-size: 10px;
    letter-spacing: 0.7em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
  }
  .centre-label .zh {
    font-family: "Noto Serif SC", serif;
    font-weight: 300;
    font-size: 38px;
    letter-spacing: 0.3em;
    color: #fff;
    text-shadow:
      0 0 8px var(--accent-glow, rgba(255,255,255,0.25)),
      0 0 30px var(--accent-glow, rgba(255,255,255,0.18));
    transition: color 0.8s ease, text-shadow 0.8s ease;
  }
  .centre-label .en {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.15em;
    color: var(--accent, #fff);
    margin-top: 6px;
    transition: color 0.8s ease;
  }

  /* ─── Initial idle hint ─── */
  .idle-hint {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, calc(-50% - 220px));
    z-index: 5;
    pointer-events: none;
    text-align: center;
    transition: opacity 0.6s ease;
  }
  .idle-hint .label {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.1em;
  }
  .idle-hint .sub {
    font-family: "Cutive Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-top: 12px;
  }
  .idle-hint.hidden { opacity: 0; }

  /* ─── Bottom selector dock ─── */
  .dock {
    position: fixed;
    left: 50%; bottom: 56px;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 18px 28px;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 100px;
    background: rgba(10, 8, 18, 0.55);
    backdrop-filter: blur(12px);
  }
  .dock-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.3s ease;
    pointer-events: auto;
    opacity: 0.55;
  }
  .dock-btn:hover  { opacity: 1; }
  .dock-btn.active { opacity: 1; transform: translateY(-6px); }
  .dock-btn .ico {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--c, #fff);
    filter: drop-shadow(0 0 6px var(--g, transparent));
    transition: color 0.4s, filter 0.4s;
  }
  .dock-btn.active .ico { filter: drop-shadow(0 0 14px var(--g, transparent)); }
  .dock-btn .label {
    font-family: "Cutive Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .dock-btn.active .label { color: var(--c, #fff); }

  .dock-divider {
    width: 1px; height: 22px;
    background: rgba(255,255,255,0.12);
  }

  /* ─── Confirm button (appears when something is selected) ─── */
  .confirm {
    position: fixed;
    left: 50%; bottom: 160px;
    transform: translateX(-50%);
    z-index: 10;
    padding: 11px 32px;
    border: 1px solid var(--accent, #fff);
    border-radius: 100px;
    background: rgba(10, 8, 18, 0.4);
    backdrop-filter: blur(10px);
    color: var(--accent, #fff);
    font-family: "Cutive Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: all 0.5s ease;
  }
  .confirm.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .confirm:hover {
    background: var(--accent, #fff);
    color: #000;
    letter-spacing: 0.65em;
    box-shadow: 0 0 30px var(--accent-glow, rgba(255,255,255,0.4));
  }
  .confirm::before, .confirm::after { content: "—"; opacity: 0.5; margin: 0 8px; }

  /* ─── HUD bits ─── */
  .hud-top {
    position: fixed; left: 50%; top: 22px;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 10px; letter-spacing: 0.4em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    pointer-events: none;
  }

  .side-hint {
    position: fixed;
    right: 32px; bottom: 32px;
    z-index: 10;
    font-size: 9px; letter-spacing: 0.25em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    pointer-events: none;
    text-align: right;
    line-height: 2;
  }
  .side-hint .key {
    border: 1px solid rgba(255,255,255,0.18);
    padding: 2px 6px; margin: 0 3px;
    color: rgba(255,255,255,0.65);
    border-radius: 2px;
  }

  @media (max-width: 700px) {
    .centre-label .zh { font-size: 28px; }
    .centre-label, .idle-hint { transform: translate(-50%, calc(-50% - 160px)); }
    .dock { gap: 14px; padding: 14px 18px; }
    .dock-divider { display: none; }
    .dock-btn .label { display: none; }
    .side-hint { display: none; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<nav>
  <div class="mark"><span class="ear">👂</span><span style="font-style:italic">XIAOER</span> · 五馆</div>
  <div class="meta">PARTICLE SELECT &middot; v0</div>
</nav>

<div class="hud-top">CHOOSE A ROOM</div>

<div class="idle-hint" id="idleHint">
  <div class="label">— 点一个馆 —</div>
  <div class="sub">click a shape below · scroll to zoom · drag to rotate</div>
</div>

<div class="centre-label" id="label" style="opacity:0">
  <div class="num">— 01 —</div>
  <div class="zh">城市馆</div>
  <div class="en">City</div>
</div>

<div class="dock" id="dock">
  <!-- five buttons injected by JS -->
</div>

<button class="confirm" id="confirm">Enter</button>

<div class="side-hint">
  <div><span class="key">CLICK</span> pick a shape</div>
  <div><span class="key">SCROLL</span> zoom in / out</div>
  <div><span class="key">Enter</span> enter room</div>
  <div><span class="key">Esc</span> back to nebula</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { MeshSurfaceSampler } from 'three/addons/math/MeshSurfaceSampler.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Five rooms × five visually-distinct shapes × five vivid colours ──
const N = 14000;
const ROOMS = [
  { num:'01', zh:'城市馆', en:'City',     color:0x3a90ff, shape:'cube',   url:'https://city-threejs.vercel.app' },
  { num:'02', zh:'跳舞馆', en:'Dance',    color:0xff4a8a, shape:'cone',   url:'https://dance-beta.vercel.app' },
  { num:'03', zh:'居家馆', en:'Home',     color:0xffc63a, shape:'house',  url:'https://ai-mvp-psi.vercel.app' },
  { num:'04', zh:'肖像馆', en:'Portrait', color:0x3aeab0, shape:'sphere', url:'https://headshot-psi-indol.vercel.app' },
  { num:'05', zh:'相机馆', en:'Camera',   color:0xff7c3a, shape:'torus',  url:'https://camera-museum-nine.vercel.app' },
];

// Tiny SVG wireframes for the dock icons (match the 3D shape)
const ICON_SVG = {
  cube:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M4 7l8-4 8 4-8 4-8-4z"/><path d="M4 7v10l8 4 8-4V7"/><path d="M12 11v10"/></svg>',
  cone:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3 L21 19 H3 Z"/><ellipse cx="12" cy="19" rx="9" ry="2" fill="none"/></svg>',
  house:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M4 11 L12 4 L20 11 V20 H4 Z"/><path d="M10 20 V14 H14 V20"/></svg>',
  sphere: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="9" ry="3.5"/><ellipse cx="12" cy="12" rx="3.5" ry="9"/></svg>',
  torus:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><ellipse cx="12" cy="12" rx="9" ry="4"/><ellipse cx="12" cy="12" rx="5" ry="2.2"/></svg>',
};

// House shape: 5-sided pitched-roof silhouette extruded into 3D
function makeHouseGeometry() {
  const shape = new THREE.Shape();
  shape.moveTo(-1.0, -1.2);
  shape.lineTo( 1.0, -1.2);
  shape.lineTo( 1.0,  0.3);
  shape.lineTo( 0.0,  1.4);  // roof peak
  shape.lineTo(-1.0,  0.3);
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: 1.6,
    bevelEnabled: true,
    bevelThickness: 0.06,
    bevelSize: 0.06,
    bevelSegments: 2,
    curveSegments: 12,
  });
  geo.translate(0, 0, -0.8);   // re-centre depth
  geo.scale(1.05, 1.05, 1.05);
  return geo;
}

function makeGeometry(name) {
  switch (name) {
    case 'cube':   return new THREE.BoxGeometry(2.4, 2.4, 2.4, 14, 14, 14);
    case 'cone':   { const g = new THREE.ConeGeometry(1.4, 2.6, 48, 12); g.translate(0, -0.2, 0); return g; }
    case 'house':  return makeHouseGeometry();
    case 'sphere': return new THREE.SphereGeometry(1.7, 64, 48);
    case 'torus':  { const g = new THREE.TorusGeometry(1.5, 0.5, 32, 96); g.rotateX(Math.PI * 0.32); return g; }
    default:       return new THREE.SphereGeometry(1.6, 32, 32);
  }
}

// Sample N points on the surface AND sort them by (y-band, angular position).
// This is the key to a stable morph: particle index i represents roughly the
// same "spatial slot" across all shapes, so when we morph from A→B, particle i
// moves to a nearby spot rather than flying across the whole scene.
function sampleGeometry(geom, count) {
  const m = new THREE.Mesh(geom, new THREE.MeshBasicMaterial());
  m.updateMatrixWorld(true);
  const sampler = new MeshSurfaceSampler(m).build();

  // 1. sample raw points
  const raw = [];
  const tmp = new THREE.Vector3();
  for (let i = 0; i < count; i++) {
    sampler.sample(tmp);
    raw.push([tmp.x, tmp.y, tmp.z]);
  }

  // 2. compute y-band + angle for each point
  // bin count tuned so each band has ~count/24 points
  const BANDS = 24;
  // find y range
  let yMin = Infinity, yMax = -Infinity;
  for (const p of raw) { if (p[1] < yMin) yMin = p[1]; if (p[1] > yMax) yMax = p[1]; }
  const yRange = (yMax - yMin) || 1;

  const tuples = raw.map(([x, y, z]) => ({
    x, y, z,
    band:  Math.min(BANDS - 1, Math.floor(((y - yMin) / yRange) * BANDS)),
    angle: Math.atan2(z, x),
  }));

  // 3. sort: ascending band, then ascending angle within band
  tuples.sort((a, b) => (a.band - b.band) || (a.angle - b.angle));

  const out = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    out[i*3+0] = tuples[i].x;
    out[i*3+1] = tuples[i].y;
    out[i*3+2] = tuples[i].z;
  }
  return out;
}

// ─── Initial nebula (scattered white) — sorted the SAME way as shapes ────
const nebula = (function buildNebula() {
  const raw = [];
  for (let i = 0; i < N; i++) {
    const r = Math.cbrt(Math.random()) * 3.5;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    raw.push([
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi),
    ]);
  }
  const BANDS = 24;
  let yMin = Infinity, yMax = -Infinity;
  for (const p of raw) { if (p[1] < yMin) yMin = p[1]; if (p[1] > yMax) yMax = p[1]; }
  const yRange = (yMax - yMin) || 1;
  const tuples = raw.map(([x, y, z]) => ({
    x, y, z,
    band:  Math.min(BANDS - 1, Math.floor(((y - yMin) / yRange) * BANDS)),
    angle: Math.atan2(z, x),
  }));
  tuples.sort((a, b) => (a.band - b.band) || (a.angle - b.angle));
  const out = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    out[i*3+0] = tuples[i].x;
    out[i*3+1] = tuples[i].y;
    out[i*3+2] = tuples[i].z;
  }
  return out;
})();

const targets = ROOMS.map(r => sampleGeometry(makeGeometry(r.shape), N));

// ─── Scene + renderer + bloom ────────────────────────────────
const canvas = document.getElementById('c');
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.55, 0.04);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─── Particle geometry + shader ──────────────────────────────
const positions = new Float32Array(N * 3);
const targetA   = new Float32Array(N * 3);
const targetB   = new Float32Array(N * 3);
const random    = new Float32Array(N);

// Start scattered (idle state)
positions.set(nebula);
targetA.set(nebula);
targetB.set(nebula);
for (let i = 0; i < N; i++) random[i] = Math.random();

const geom = new THREE.BufferGeometry();
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geom.setAttribute('aTargetA', new THREE.BufferAttribute(targetA, 3));
geom.setAttribute('aTargetB', new THREE.BufferAttribute(targetB, 3));
geom.setAttribute('aRandom',  new THREE.BufferAttribute(random, 1));

const uniforms = {
  uProgress:  { value: 0.0 },
  uColorA:    { value: new THREE.Color(0xffffff) },   // idle white
  uColorB:    { value: new THREE.Color(0xffffff) },
  uIdle:      { value: 1.0 },                          // 1 = idle nebula, 0 = formed shape
  uTime:      { value: 0 },
  uSize:      { value: 5.5 * renderer.getPixelRatio() },
};

const material = new THREE.ShaderMaterial({
  uniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    attribute vec3 aTargetA;
    attribute vec3 aTargetB;
    attribute float aRandom;
    uniform float uProgress;
    uniform float uTime;
    uniform float uSize;
    uniform float uIdle;
    varying float vNoise;
    varying float vProgress;

    // Shared-axis curl: all particles bow around the SAME axis (mostly Y with a
    // slight Z lean) — keeps the swarm coherent instead of every particle flying
    // off in its own random direction. Magnitude per particle still varies, so
    // it doesn't look like a rigid rotation.
    vec3 curlOffset(vec3 a, vec3 b, float t, float seed) {
      vec3 mid = mix(a, b, 0.5);
      vec3 sharedAxis = normalize(vec3(0.0, 1.0, 0.25));
      vec3 dir  = b - a + vec3(0.0001);
      vec3 perp = normalize(cross(dir, sharedAxis)) * length(dir) * 0.10; // was 0.28
      // small per-particle variation so it's not a stiff orbit
      float arc = sin(t * 3.14159) * (0.55 + 0.45 * seed);
      return mid + perp * arc;
    }

    void main() {
      // Tighter stagger band: 0.20 (was 0.32) — particles arrive closer together
      float p = clamp((uProgress - aRandom * 0.20) / 0.80, 0.0, 1.0);
      // smoother ease (smootherstep)
      p = p * p * p * (p * (p * 6.0 - 15.0) + 10.0);
      vProgress = p;

      vec3 mid = curlOffset(aTargetA, aTargetB, p, aRandom);
      vec3 pos = mix(
        mix(aTargetA, mid, p),
        mix(mid, aTargetB, p),
        p
      );

      // Idle drift only when actually idle (uIdle near 1); strongly suppressed
      // while formed into a shape so the shape stays readable.
      float drift = uIdle * 0.06;
      pos += vec3(
        sin(uTime * 0.7 + aRandom * 18.0),
        cos(uTime * 0.9 + aRandom * 24.0),
        sin(uTime * 1.1 + aRandom * 31.0)
      ) * drift;

      vNoise = aRandom;

      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = uSize * (1.0 / -mv.z) * (0.65 + 0.5 * aRandom);
    }
  `,
  fragmentShader: /* glsl */`
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform float uProgress;
    uniform float uIdle;
    varying float vNoise;
    varying float vProgress;

    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      float a = smoothstep(0.5, 0.0, d);
      if (a < 0.02) discard;

      float colorProg = smoothstep(0.15, 0.85, uProgress);
      vec3 col = mix(uColorA, uColorB, colorProg);
      // idle adds a soft warm tint so pure white doesn't look flat
      col = mix(col, vec3(0.85, 0.86, 0.9), uIdle * 0.4);
      col += vec3(0.18) * vProgress * (1.0 - vProgress) * 3.5;

      gl_FragColor = vec4(col, a * (0.8 + 0.2 * vNoise));
    }
  `,
});

const points = new THREE.Points(geom, material);
scene.add(points);

// Gentle constant rotation (so it never looks dead)
let baseRotY = 0, baseRotX = 0;
let userRotY = 0, userRotX = 0;
let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('mousedown', e => {
  dragging = true;
  document.documentElement.classList.add('dragging');
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => {
  dragging = false;
  document.documentElement.classList.remove('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  userRotY += (e.clientX - lastX) * 0.005;
  userRotX = Math.max(-0.6, Math.min(0.6, userRotX + (e.clientY - lastY) * 0.003));
  lastX = e.clientX; lastY = e.clientY;
});

// ─── Build the dock ──────────────────────────────────────────
const dock = document.getElementById('dock');
ROOMS.forEach((r, i) => {
  const btn = document.createElement('div');
  btn.className = 'dock-btn';
  btn.dataset.idx = i;
  btn.style.setProperty('--c', `#${r.color.toString(16).padStart(6,'0')}`);
  btn.style.setProperty('--g', `#${r.color.toString(16).padStart(6,'0')}`);
  btn.innerHTML = `
    <div class="ico">${ICON_SVG[r.shape]}</div>
    <div class="label">${r.zh}</div>
  `;
  // CLICK ONLY — hover gives UI feedback but doesn't morph the swarm.
  btn.addEventListener('click', () => selectRoom(i, { lock: true }));
  dock.appendChild(btn);
  if (i < ROOMS.length - 1) {
    const div = document.createElement('div'); div.className = 'dock-divider';
    dock.appendChild(div);
  }
});
const dockBtns = [...dock.querySelectorAll('.dock-btn')];

// ─── Selection driver ────────────────────────────────────────
let currentIdx = -1;       // -1 = idle nebula
let targetIdx  = -1;
let morphStart = 0;
let morphing   = false;
let mode = 'idle';         // 'idle' = white nebula, waiting | 'locked' = user picked a shape
const MORPH_DURATION = 2.2;

const labelEl     = document.getElementById('label');
const idleHintEl  = document.getElementById('idleHint');
const confirmEl   = document.getElementById('confirm');

function paintRoom(idx) {
  if (idx < 0) return;
  const r = ROOMS[idx];
  const hex = `#${r.color.toString(16).padStart(6,'0')}`;
  const glow = `rgba(${(r.color>>16)&255}, ${(r.color>>8)&255}, ${r.color&255}, 0.45)`;
  labelEl.style.setProperty('--accent', hex);
  labelEl.style.setProperty('--accent-glow', glow);
  labelEl.querySelector('.num').textContent = `— ${r.num} —`;
  labelEl.querySelector('.zh').textContent  = r.zh;
  labelEl.querySelector('.en').textContent  = r.en;
  confirmEl.style.setProperty('--accent', hex);
  confirmEl.style.setProperty('--accent-glow', glow);
  confirmEl.textContent = `进入 ${r.zh}`;
  dockBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
}

function selectRoom(idx, opts = {}) {
  const { lock = true } = opts;          // default: every selection locks

  if (idx === targetIdx && !morphing) return;
  if (morphing && !lock) return;
  if (idx === currentIdx && !morphing && lock) {
    // user clicked the already-formed shape → just lock & show confirm
    mode = 'locked';
    paintRoom(idx);
    confirmEl.classList.add('visible');
    return;
  }

  // First time anything happens: hide idle hint, show label
  if (currentIdx < 0 && targetIdx < 0) {
    idleHintEl.classList.add('hidden');
    labelEl.style.opacity = '1';
  }

  paintRoom(idx);

  // Set morph source/target buffers
  const aA = geom.getAttribute('aTargetA');
  const aB = geom.getAttribute('aTargetB');
  aA.array.set(currentIdx < 0 ? nebula : targets[currentIdx]);
  aB.array.set(targets[idx]);
  aA.needsUpdate = true;
  aB.needsUpdate = true;

  uniforms.uColorA.value.setHex(currentIdx < 0 ? 0xffffff : ROOMS[currentIdx].color);
  uniforms.uColorB.value.setHex(ROOMS[idx].color);

  // Reset progress so the morph genuinely starts from aA (current shape).
  // We do this ONLY here — never at morph completion — because uProgress=0
  // in the shader renders aA, and we want the FORMED shape (aB) to persist
  // between morphs.
  uniforms.uProgress.value = 0;

  targetIdx = idx;
  morphing = true;
  morphStart = clock.getElapsedTime();

  if (lock) {
    mode = 'locked';
    confirmEl.classList.add('visible');
  } else {
    // Auto-cycle morph in progress — keep confirm hidden
    confirmEl.classList.remove('visible');
  }
}

// (No auto-cycle: the swarm stays as the white nebula until the user
// clicks a dock button. Removed for clarity per Jane's request.)

// Esc → morph the swarm back to the white nebula (idle state)
function backToIdle() {
  if (mode === 'idle' && currentIdx < 0 && !morphing) return;

  const aA = geom.getAttribute('aTargetA');
  const aB = geom.getAttribute('aTargetB');
  aA.array.set(currentIdx < 0 ? nebula : targets[currentIdx]);
  aB.array.set(nebula);
  aA.needsUpdate = true;
  aB.needsUpdate = true;

  uniforms.uColorA.value.setHex(currentIdx < 0 ? 0xffffff : ROOMS[currentIdx].color);
  uniforms.uColorB.value.setHex(0xffffff);
  uniforms.uProgress.value = 0;

  targetIdx = -1;
  morphing = true;
  morphStart = clock.getElapsedTime();
  mode = 'idle';

  confirmEl.classList.remove('visible');
  labelEl.style.opacity = '0';
  idleHintEl.classList.remove('hidden');
  dockBtns.forEach(b => b.classList.remove('active'));
}

// Confirm → navigate
confirmEl.addEventListener('click', () => {
  if (targetIdx < 0) return;
  window.open(ROOMS[targetIdx].url, '_blank', 'noopener');
});

// Keyboard — same rule as the dock: any selection locks (auto-cycle stops)
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowRight' || e.code === 'ArrowDown') {
    e.preventDefault();
    const next = currentIdx < 0 ? 0 : Math.min(currentIdx + 1, ROOMS.length - 1);
    selectRoom(next, { lock: true });
  } else if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') {
    e.preventDefault();
    const next = currentIdx < 0 ? 0 : Math.max(currentIdx - 1, 0);
    selectRoom(next, { lock: true });
  } else if (e.code === 'Enter') {
    e.preventDefault();
    if (targetIdx >= 0) window.open(ROOMS[targetIdx].url, '_blank', 'noopener');
  } else if (e.code === 'Escape') {
    e.preventDefault();
    backToIdle();
  } else if (e.code === 'Digit1') selectRoom(0, { lock: true });
  else if   (e.code === 'Digit2') selectRoom(1, { lock: true });
  else if   (e.code === 'Digit3') selectRoom(2, { lock: true });
  else if   (e.code === 'Digit4') selectRoom(3, { lock: true });
  else if   (e.code === 'Digit5') selectRoom(4, { lock: true });
});

// Mouse wheel = camera dolly (zoom into / out of the particle cloud)
// At z ≈ 0.5 the camera passes through the particle surface — you can see
// the inside walls. At z ≈ 14 the cloud is small and centred.
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 14;
let zoomTarget = camera.position.z;
window.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.10 : 1 / 1.10;
  zoomTarget = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomTarget * factor));
}, { passive: false });

// Click on canvas = confirm if user has locked in a shape
canvas.addEventListener('click', () => {
  if (mode === 'locked' && targetIdx >= 0 && !morphing) {
    window.open(ROOMS[targetIdx].url, '_blank', 'noopener');
  }
});

// ─── Resize ──────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  uniforms.uSize.value = 5.5 * renderer.getPixelRatio();
});

// ─── Render loop ─────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  const elapsed = clock.getElapsedTime();
  uniforms.uTime.value = elapsed;

  // Base auto-rotate freezes during a morph so the swarm doesn't appear to
  // "chase" itself. Picks back up once the shape has fully formed.
  if (!morphing) baseRotY += 0.0015;
  const rotY = baseRotY + userRotY;
  const rotX = baseRotX + userRotX;
  points.rotation.y = rotY;
  points.rotation.x = rotX;

  if (morphing) {
    const t = (elapsed - morphStart) / MORPH_DURATION;
    uniforms.uProgress.value = Math.min(t, 1.0);
    if (t >= 1.0) {
      morphing = false;
      currentIdx = targetIdx;
      // Don't reset uProgress: shader stays on aB (the just-formed shape).
      uniforms.uIdle.value = currentIdx < 0 ? 1.0 : 0.08;
    }
  }

  // Smooth camera zoom toward target
  camera.position.z += (zoomTarget - camera.position.z) * 0.10;

  composer.render();
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
