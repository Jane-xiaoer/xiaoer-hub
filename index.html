<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>小耳 · 五馆</title>
<meta name="description" content="五道门,五个馆 — 小耳 Jane 的互动项目集" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👂</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Cutive+Mono&family=Noto+Serif+SC:wght@300;500&display=swap" rel="stylesheet">

<style>
  /* ─── Moebius palette ─────────────────────────────────────────
     Inspired by Jean Giraud's desert-twilight skies and ink-line
     economy. No purple. Earth + sky only. ───────────────────── */
  :root {
    --ink:           #1a0e08;   /* deep brown-black ink */
    --bg-deep:       #1b1208;   /* night-desert horizon */
    --bg-mid:        #382014;   /* shadowed canyon */
    --bg-warm:       #6a3e22;   /* dusk dust */
    --paper:         #e8d4a8;   /* sand-gold paper */
    --cream:         #f4ebd0;   /* parchment */
    --sky-blue:      #7898b8;   /* twilight sky */
    --brick-red:     #c24838;   /* fired clay */
    --sand-gold:     #d8a868;   /* dunes at noon */
    --moss-green:    #6a8868;   /* tropical lichen */
    --dust-pink:     #d8a098;   /* canyon blush */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--cream);
    font-family: "Cutive Mono", ui-monospace, monospace;
    cursor: grab;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  html.dragging, html.dragging * { cursor: grabbing; }
  a { color: inherit; text-decoration: none; }

  /* ─── Background: dusk-desert sky gradient ──────────────────── */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% 110%, rgba(194, 72, 56, 0.32), transparent 65%),
      radial-gradient(ellipse 60% 50% at 25% 30%, rgba(120, 152, 184, 0.18), transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 25%, rgba(216, 168, 104, 0.12), transparent 60%),
      linear-gradient(180deg, #2a1c10 0%, #382014 35%, #6a3e22 70%, #c24838 100%);
    z-index: 0;
    pointer-events: none;
    animation: skyShift 40s ease-in-out infinite alternate;
  }
  @keyframes skyShift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(-2%, 2%) scale(1.04); }
  }

  /* ─── Distant horizon dunes (silhouette) ────────────────────── */
  body::after {
    content: "";
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 32vh;
    background:
      radial-gradient(ellipse 60% 100% at 20% 100%, var(--ink) 30%, transparent 50%),
      radial-gradient(ellipse 80% 100% at 60% 100%, var(--bg-deep) 40%, transparent 60%),
      radial-gradient(ellipse 50% 100% at 90% 100%, var(--bg-mid)  35%, transparent 55%);
    z-index: 0;
    pointer-events: none;
  }

  /* ─── Mandala (centre, behind doors) ────────────────────────── */
  .mandala {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 900px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
    animation: mandalaRotate 120s linear infinite;
  }
  .mandala-fast {
    animation-duration: 60s;
    animation-direction: reverse;
    opacity: 0.35;
    width: 600px; height: 600px;
  }
  @keyframes mandalaRotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* ─── Floating star markers (Moebius-style tiny constellations) ─ */
  .stars {
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    color: var(--paper);
    font-size: 14px;
    opacity: 0;
    animation: starBlink 8s ease-in-out infinite;
  }
  .star.s1  { top: 12%; left: 18%; animation-delay: 0s;   }
  .star.s2  { top:  8%; left: 72%; animation-delay: -1.4s;}
  .star.s3  { top: 22%; left: 88%; animation-delay: -2.8s;}
  .star.s4  { top: 34%; left:  6%; animation-delay: -4.2s;}
  .star.s5  { top: 18%; left: 48%; animation-delay: -5.6s;}
  .star.s6  { top: 42%; left: 92%; animation-delay: -7.0s;}
  .star.s7  { top:  6%; left: 32%; animation-delay: -0.7s;}
  .star.s8  { top: 28%; left: 60%; animation-delay: -3.5s;}
  .star.s9  { top: 14%; left: 86%; animation-delay: -6.3s;}
  .star.s10 { top: 38%; left: 22%; animation-delay: -5.0s;}
  @keyframes starBlink {
    0%, 100% { opacity: 0; transform: scale(0.6); }
    20%, 80% { opacity: 0.7; transform: scale(1); }
  }

  /* ─── Dust particles drifting upward ────────────────────────── */
  .dust {
    position: fixed;
    width: 2px; height: 2px;
    background: var(--paper);
    border-radius: 50%;
    opacity: 0;
    z-index: 0;
    pointer-events: none;
    box-shadow: 0 0 4px rgba(232, 212, 168, 0.6);
    animation: dustRise 18s linear infinite;
  }
  @keyframes dustRise {
    0%   { transform: translateY(20vh); opacity: 0; }
    15%  { opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translateY(-110vh); opacity: 0; }
  }

  /* ─── Top nav ───────────────────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 36px;
    z-index: 10;
    pointer-events: none;
  }
  nav .mark {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: var(--cream);
    text-shadow: 0 0 24px rgba(216, 168, 104, 0.35);
    position: relative;
  }
  nav .mark .ear { display: inline-block; margin-right: 8px; }
  nav .mark::before {
    content: "·";
    margin-right: 8px;
    color: var(--sand-gold);
  }
  nav .meta {
    font-family: "Cutive Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: rgba(244, 235, 208, 0.45);
    text-transform: uppercase;
  }

  /* Glitch effect on the mark (Moebius print misregistration) */
  nav .mark .glitch {
    position: relative;
    display: inline-block;
  }
  nav .mark .glitch::before,
  nav .mark .glitch::after {
    content: attr(data-text);
    position: absolute; top: 0; left: 0;
    opacity: 0;
    pointer-events: none;
  }
  nav .mark .glitch::before {
    color: var(--brick-red);
    animation: glitchA 7s steps(1, end) infinite;
  }
  nav .mark .glitch::after {
    color: var(--sky-blue);
    animation: glitchB 7s steps(1, end) infinite;
  }
  @keyframes glitchA {
    0%, 96%, 100% { opacity: 0; transform: translate(0,0); }
    97% { opacity: 0.7; transform: translate(-2px, 1px); }
    98% { opacity: 0.7; transform: translate(2px, -1px); }
    99% { opacity: 0; }
  }
  @keyframes glitchB {
    0%, 96.5%, 100% { opacity: 0; transform: translate(0,0); }
    97.5% { opacity: 0.6; transform: translate(2px, -1px); }
    98.5% { opacity: 0.6; transform: translate(-2px, 1px); }
  }

  /* ─── Stage ─────────────────────────────────────────────────── */
  .stage {
    position: fixed; inset: 0;
    perspective: 1500px;
    perspective-origin: 50% 50%;
    z-index: 1;
  }
  .pentagon {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    transform-style: preserve-3d;
    transform: translate(-50%, -50%) rotateX(var(--tilt, -8deg)) rotateY(var(--rotation, 0deg));
    will-change: transform;
    animation: pentagonEnter 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes pentagonEnter {
    0%   { transform: translate(-50%, -50%) rotateX(60deg) rotateY(-180deg) scale(0.4); opacity: 0; }
    100% { transform: translate(-50%, -50%) rotateX(var(--tilt, -8deg)) rotateY(var(--rotation, 0deg)) scale(1); opacity: 1; }
  }

  /* ─── Energy lines from centre to each door ─────────────────── */
  .energy-lines {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    z-index: 0;
    pointer-events: none;
  }
  .energy-line {
    position: absolute;
    top: 0; left: 0;
    width: 280px;
    height: 1px;
    background: linear-gradient(90deg, var(--paper) 0%, transparent 100%);
    opacity: 0.25;
    transform-origin: 0 0;
  }
  .energy-line.e1 { transform: rotate(-90deg); }   /* top */
  .energy-line.e2 { transform: rotate(-18deg); }   /* top-right */
  .energy-line.e3 { transform: rotate( 54deg); }   /* bottom-right */
  .energy-line.e4 { transform: rotate(126deg); }   /* bottom-left */
  .energy-line.e5 { transform: rotate(198deg); }   /* top-left */

  /* ─── Door ──────────────────────────────────────────────────── */
  .door {
    --door-w: 290px;
    --door-h: 400px;
    --door-r: 300px;
    --accent: var(--sand-gold);
    --accent-soft: rgba(216, 168, 104, 0.35);

    position: absolute;
    top: calc(var(--door-h) / -2);
    left: calc(var(--door-w) / -2);
    width: var(--door-w);
    height: var(--door-h);
    transform-style: preserve-3d;
    cursor: pointer;
    pointer-events: auto;

    background:
      linear-gradient(180deg,
        rgba(28, 18, 8, 0.94) 0%,
        rgba(44, 28, 16, 0.94) 60%,
        rgba(58, 36, 20, 0.96) 100%);
    border: 1px solid var(--accent);
    border-radius: 2px;
    overflow: hidden;
    backface-visibility: hidden;

    box-shadow:
      0 0 0 1px rgba(216, 168, 104, 0.10),
      0 0 24px var(--accent-soft),
      inset 0 0 80px rgba(232, 212, 168, 0.04);

    transition: box-shadow 0.5s ease, transform 0.5s ease, border-color 0.5s ease;
  }
  /* Per-door accent colour. Order: 城市/跳舞/挂画/肖像/相机 */
  .door.d1 { transform: rotateY(  0deg) translateZ(var(--door-r)); --accent: var(--sky-blue);  --accent-soft: rgba(120, 152, 184, 0.42); }
  .door.d2 { transform: rotateY( 72deg) translateZ(var(--door-r)); --accent: var(--dust-pink); --accent-soft: rgba(216, 160, 152, 0.42); }
  .door.d3 { transform: rotateY(144deg) translateZ(var(--door-r)); --accent: var(--sand-gold); --accent-soft: rgba(216, 168, 104, 0.42); }
  .door.d4 { transform: rotateY(216deg) translateZ(var(--door-r)); --accent: var(--brick-red); --accent-soft: rgba(194, 72, 56, 0.42); }
  .door.d5 { transform: rotateY(288deg) translateZ(var(--door-r)); --accent: var(--moss-green);--accent-soft: rgba(106, 136, 104, 0.42); }

  .door:hover {
    border-color: var(--accent);
    box-shadow:
      0 0 0 1px var(--accent),
      0 0 30px var(--accent-soft),
      0 0 80px var(--accent-soft),
      inset 0 0 80px rgba(232, 212, 168, 0.10);
  }

  /* ─── Cross-hatch lines on each door (Moebius signature) ────── */
  .door-hatch {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg,
        transparent 0px, transparent 8px,
        rgba(232, 212, 168, 0.04) 8px, rgba(232, 212, 168, 0.04) 9px),
      repeating-linear-gradient(-45deg,
        transparent 0px, transparent 8px,
        rgba(232, 212, 168, 0.025) 8px, rgba(232, 212, 168, 0.025) 9px);
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .door:hover .door-hatch {
    background-image:
      repeating-linear-gradient(45deg,
        transparent 0px, transparent 5px,
        rgba(232, 212, 168, 0.08) 5px, rgba(232, 212, 168, 0.08) 6px),
      repeating-linear-gradient(-45deg,
        transparent 0px, transparent 5px,
        rgba(232, 212, 168, 0.05) 5px, rgba(232, 212, 168, 0.05) 6px);
  }

  /* Decorative corner brackets — thinner, more Moebius */
  .door::before, .door::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    border: 1px solid var(--accent);
    opacity: 0.45;
    transition: opacity 0.4s, width 0.4s, height 0.4s;
  }
  .door::before { top: 10px;    left: 10px;   border-right: 0; border-bottom: 0; }
  .door::after  { bottom: 10px; right: 10px;  border-left:  0; border-top:    0; }
  .door:hover::before, .door:hover::after { opacity: 1; width: 22px; height: 22px; }

  /* ─── Door inner content ────────────────────────────────────── */
  .door-inner {
    position: absolute;
    inset: 0;
    padding: 28px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    text-align: center;
  }
  .door-num {
    font-family: "Cutive Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--accent);
    opacity: 0.65;
  }
  .door-num::before, .door-num::after {
    content: "—";
    margin: 0 8px;
    opacity: 0.5;
  }
  .door-icon {
    font-size: 88px;
    line-height: 1;
    filter: drop-shadow(0 0 18px var(--accent-soft)) drop-shadow(0 4px 8px rgba(0,0,0,0.55));
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: iconBreathe 6s ease-in-out infinite;
  }
  @keyframes iconBreathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  .door:hover .door-icon {
    transform: translateY(-6px) scale(1.08) rotate(-2deg);
  }
  .door-title-wrap { text-align: center; }
  .door-zh {
    font-family: "Noto Serif SC", "Cormorant Garamond", serif;
    font-weight: 300;
    font-size: 30px;
    letter-spacing: 0.15em;
    color: var(--cream);
    text-shadow: 0 0 14px var(--accent-soft);
  }
  .door-en {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-top: 6px;
    opacity: 0.85;
  }
  .door-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: "Cutive Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(244, 235, 208, 0.55);
    padding: 4px 0;
    position: relative;
    transition: color 0.4s, letter-spacing 0.4s;
  }
  .door-cta::before, .door-cta::after {
    content: "";
    display: inline-block;
    width: 12px; height: 1px;
    background: currentColor;
    opacity: 0.5;
  }
  .door:hover .door-cta {
    color: var(--accent);
    letter-spacing: 0.55em;
  }

  /* Tiny moebius mark above number — thin double line */
  .door-mark {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 28px; height: 1px;
    background: var(--accent);
    opacity: 0.45;
  }
  .door-mark::after {
    content: "";
    position: absolute;
    top: 3px; left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 1px;
    background: var(--accent);
  }

  /* ─── Centre core (pulse) ───────────────────────────────────── */
  .core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    background: var(--paper);
    border-radius: 50%;
    box-shadow:
      0 0 14px var(--paper),
      0 0 32px rgba(232, 212, 168, 0.7),
      0 0 72px rgba(216, 168, 104, 0.4);
    z-index: 3;
    pointer-events: none;
    animation: corePulse 5s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.55; transform: translate(-50%, -50%) scale(1.6); }
  }
  /* Core ring */
  .core-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    border: 1px solid var(--paper);
    border-radius: 50%;
    opacity: 0.18;
    z-index: 2;
    pointer-events: none;
    animation: ringPulse 5s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%, 100% { width: 60px;  height: 60px;  opacity: 0.18; }
    50%      { width: 100px; height: 100px; opacity: 0.05; }
  }

  /* ─── HUD ───────────────────────────────────────────────────── */
  .hud {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: "Cutive Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: rgba(244, 235, 208, 0.4);
    text-transform: uppercase;
    pointer-events: none;
    text-align: center;
  }
  .hud .hint-key {
    border: 1px solid rgba(244, 235, 208, 0.25);
    padding: 2px 8px;
    margin: 0 4px;
    color: rgba(244, 235, 208, 0.65);
  }

  .side-meta {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 10;
    font-family: "Cutive Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(244, 235, 208, 0.4);
    text-transform: uppercase;
    text-align: right;
    pointer-events: none;
    line-height: 1.9;
  }
  .side-meta .row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
  .side-meta .dot {
    width: 5px; height: 5px;
    background: var(--sand-gold);
    box-shadow: 0 0 6px var(--sand-gold);
    animation: corePulse 2.4s ease-in-out infinite;
  }

  .corner-meta {
    position: fixed;
    top: 80px; left: 36px;
    z-index: 10;
    font-family: "Cutive Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(244, 235, 208, 0.35);
    text-transform: uppercase;
    line-height: 1.9;
    pointer-events: none;
  }
  .corner-meta .label {
    color: var(--sand-gold);
    opacity: 0.7;
  }

  /* Door opening animation */
  .door.opening {
    animation: doorOpen 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes doorOpen {
    0%   { transform: rotateY(var(--y-base, 0deg)) translateZ(var(--door-r)) scale(1);   opacity: 1; }
    40%  { transform: rotateY(var(--y-base, 0deg)) translateZ(calc(var(--door-r) * 1.2)) scale(1.1); opacity: 1; }
    100% { transform: rotateY(var(--y-base, 0deg)) translateZ(calc(var(--door-r) * 2.2)) scale(2.4); opacity: 0; }
  }

  /* Mobile */
  @media (max-width: 700px) {
    .door {
      --door-w: 220px;
      --door-h: 310px;
      --door-r: 220px;
    }
    .door-icon { font-size: 70px; }
    .door-zh { font-size: 24px; }
    .mandala { width: 600px; height: 600px; }
    .mandala-fast { width: 400px; height: 400px; }
    .corner-meta { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0ms !important;
    }
  }
</style>
</head>
<body>

<!-- ─── Mandala (background, behind everything) ─── -->
<svg class="mandala" viewBox="-300 -300 600 600">
  <g fill="none" stroke="#d8a868" stroke-width="0.8" opacity="0.7">
    <!-- Outer ring of dashes -->
    <circle r="280" stroke-dasharray="2 6"/>
    <circle r="260" stroke-dasharray="1 14" stroke-width="0.5"/>

    <!-- Pentagram lines -->
    <g stroke="#d8a868" stroke-width="0.6" opacity="0.5">
      <line x1="0"      y1="-220" x2="129"  y2="68"/>
      <line x1="129"    y1="68"   x2="-209" y2="-68"/>
      <line x1="-209"   y1="-68"  x2="209"  y2="-68"/>
      <line x1="209"    y1="-68"  x2="-129" y2="68"/>
      <line x1="-129"   y1="68"   x2="0"    y2="-220"/>
    </g>

    <!-- Inner concentric circles -->
    <circle r="180"/>
    <circle r="140" stroke-dasharray="4 4"/>
    <circle r="100" stroke="#7898b8" opacity="0.4"/>
    <circle r="60"/>

    <!-- Radial tick marks (24 of them) -->
    <g stroke="#d8a868" stroke-width="0.6">
      <g><line x1="200" y1="0" x2="220" y2="0"/></g>
      <g transform="rotate(15)"><line x1="200" y1="0" x2="210" y2="0"/></g>
      <g transform="rotate(30)"><line x1="200" y1="0" x2="220" y2="0"/></g>
      <g transform="rotate(45)"><line x1="200" y1="0" x2="210" y2="0"/></g>
      <g transform="rotate(60)"><line x1="200" y1="0" x2="220" y2="0"/></g>
      <g transform="rotate(75)"><line x1="200" y1="0" x2="210" y2="0"/></g>
      <g transform="rotate(90)"><line x1="200" y1="0" x2="220" y2="0"/></g>
      <g transform="rotate(105)"><line x1="200" y1="0" x2="210" y2="0"/></g>
      <g transform="rotate(120)"><line x1="200" y1="0" x2="220" y2="0"/></g>

<script>
(function () {
  const pentagon = document.getElementById('pentagon');
  const stage    = document.getElementById('stage');

  // Camera state
  let rotation   = 0;
  let velocity   = 0;
  let tilt       = -8;
  let dragging   = false;
  let lastX = 0, lastY = 0, lastTime = 0;
  let lastInteractTime = performance.now() + 1400; // wait for entry anim to finish
  const IDLE_THRESHOLD_MS = 2500;
  const AUTO_SPEED        = 0.06;

  function applyTransform() {
    pentagon.style.setProperty('--rotation', rotation + 'deg');
    pentagon.style.setProperty('--tilt',     tilt     + 'deg');
  }
  applyTransform();

  function onDragStart(e) {
    dragging = true;
    document.documentElement.classList.add('dragging');
    const point = e.touches ? e.touches[0] : e;
    lastX = point.clientX;
    lastY = point.clientY;
    lastTime = performance.now();
    velocity = 0;
  }
  function onDragMove(e) {
    if (!dragging) return;
    const point = e.touches ? e.touches[0] : e;
    const dx = point.clientX - lastX;
    const dy = point.clientY - lastY;
    const now = performance.now();
    const dt = Math.max(now - lastTime, 1);
    rotation += dx * 0.4;
    tilt = Math.max(-30, Math.min(15, tilt - dy * 0.15));
    velocity = (dx * 0.4) / (dt / 16);
    lastX = point.clientX;
    lastY = point.clientY;
    lastTime = now;
    lastInteractTime = now;
    applyTransform();
  }
  function onDragEnd() {
    if (!dragging) return;
    dragging = false;
    document.documentElement.classList.remove('dragging');
  }

  stage.addEventListener('mousedown',   onDragStart);
  window.addEventListener('mousemove',  onDragMove);
  window.addEventListener('mouseup',    onDragEnd);
  stage.addEventListener('touchstart',  onDragStart, { passive: true });
  window.addEventListener('touchmove',  onDragMove,  { passive: true });
  window.addEventListener('touchend',   onDragEnd);

  document.querySelectorAll('.door').forEach((door) => {
    let mouseDownX = 0, mouseDownY = 0;
    door.addEventListener('mousedown', (e) => { mouseDownX = e.clientX; mouseDownY = e.clientY; });
    door.addEventListener('click', (e) => {
      const dx = Math.abs(e.clientX - mouseDownX);
      const dy = Math.abs(e.clientY - mouseDownY);
      if (dx > 5 || dy > 5) { e.preventDefault(); return; }
      e.preventDefault();
      const y = door.dataset.y || '0';
      door.style.setProperty('--y-base', y + 'deg');
      door.classList.add('opening');
      const href = door.href;
      setTimeout(() => {
        window.open(href, '_blank', 'noopener');
        setTimeout(() => door.classList.remove('opening'), 800);
      }, 480);
    });
  });

  // Inertia + auto-rotate
  function tick() {
    const now = performance.now();
    if (!dragging) {
      if (Math.abs(velocity) > 0.02) {
        rotation += velocity;
        velocity *= 0.94;
        lastInteractTime = now;
      } else if (now - lastInteractTime > IDLE_THRESHOLD_MS) {
        rotation += AUTO_SPEED;
      }
      if (Math.abs(tilt - (-8)) > 0.05 && now - lastInteractTime > IDLE_THRESHOLD_MS) {
        tilt += ((-8) - tilt) * 0.02;
      }
      applyTransform();
    }
    requestAnimationFrame(tick);
  }
  tick();

  stage.addEventListener('wheel', (e) => {
    e.preventDefault();
    tilt = Math.max(-30, Math.min(15, tilt + e.deltaY * 0.05));
    lastInteractTime = performance.now();
    applyTransform();
  }, { passive: false });

  // ── Dust particles (spawn periodically) ──
  const dustLayer = document.getElementById('dust-layer');
  function spawnDust() {
    const d = document.createElement('div');
    d.className = 'dust';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.animationDelay = '0s';
    d.style.animationDuration = (14 + Math.random() * 10) + 's';
    d.style.opacity = '0';
    dustLayer.appendChild(d);
    setTimeout(() => d.remove(), 24000);
  }
  // initial burst + recurring
  for (let i = 0; i < 18; i++) {
    setTimeout(spawnDust, i * 800);
  }
  setInterval(spawnDust, 1100);
})();
</script>
