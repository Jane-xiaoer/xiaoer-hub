<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>小耳 · Hub</title>
<meta name="description" content="小耳 Jane 的互动项目集 — 5 道门,每道是一个馆" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👂</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;500&family=Noto+Serif+SC:wght@300;700&display=swap" rel="stylesheet">

<style>
  /* ─── Reset & base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0a0612;
    color: #e8e8f0;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    cursor: grab;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  html.dragging, html.dragging * { cursor: grabbing; }
  a { color: inherit; text-decoration: none; }

  /* ─── Background: deep purple gradient + animated gradient mesh ─── */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(140, 80, 220, 0.25), transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 70%, rgba(60, 140, 220, 0.20), transparent 60%),
      radial-gradient(ellipse 50% 60% at 50% 100%, rgba(220, 80, 160, 0.15), transparent 60%),
      linear-gradient(180deg, #0a0612 0%, #14092a 50%, #0a0612 100%);
    pointer-events: none;
    z-index: 0;
    animation: bgShift 24s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(-3%, 3%) scale(1.05); }
  }

  /* ─── Floating geometric shapes in the void (decoration) ─── */
  .void-shape {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.3;
    filter: blur(1px);
    animation: floatShape 20s ease-in-out infinite;
  }
  .void-shape.s1 { top: 8%;  left: 6%;  width: 120px; height: 120px; animation-delay: 0s; }
  .void-shape.s2 { top: 12%; right: 8%; width: 80px;  height: 80px;  animation-delay: -7s; }
  .void-shape.s3 { bottom: 10%; left: 12%; width: 100px; height: 100px; animation-delay: -14s; }
  .void-shape.s4 { bottom: 14%; right: 6%; width: 90px; height: 90px;  animation-delay: -4s; }
  @keyframes floatShape {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    33%      { transform: translate(20px, -30px) rotate(120deg); }
    66%      { transform: translate(-15px, 20px) rotate(240deg); }
  }

  /* ─── Top nav: minimal mark ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    z-index: 10;
    pointer-events: none;
  }
  nav .mark {
    font-family: "DM Serif Display", serif;
    font-style: italic;
    font-size: 18px;
    letter-spacing: 0.02em;
    color: #f0f0fa;
    text-shadow: 0 0 24px rgba(160, 120, 240, 0.4);
  }
  nav .mark .ear {
    display: inline-block;
    transform: translateY(-1px);
    margin-right: 6px;
  }
  nav .meta {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(232, 232, 240, 0.45);
    text-transform: uppercase;
  }

  /* ─── Stage: the 3D scene container ─── */
  .stage {
    position: fixed; inset: 0;
    perspective: 1400px;
    perspective-origin: 50% 50%;
    z-index: 1;
  }
  .pentagon {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    transform-style: preserve-3d;
    transform: translate(-50%, -50%) rotateX(var(--tilt, -8deg)) rotateY(var(--rotation, 0deg));
    transition: transform 0.06s linear;  /* very slight smoothing for inertia */
    will-change: transform;
  }

  /* ─── Door: each face of the pentagon ─── */
  /* Pentagon radius: how far each door sits from the centre.
     With 5 doors at 72° spacing, radius ~ width / (2 * tan(π/5)) = width * 0.688 */
  .door {
    --door-w: 280px;
    --door-h: 380px;
    --door-r: 280px;  /* distance from centre (z translate) */
    --accent: #c8a8ff;
    --accent-glow: rgba(200, 168, 255, 0.35);

    position: absolute;
    top: calc(var(--door-h) / -2);
    left: calc(var(--door-w) / -2);
    width: var(--door-w);
    height: var(--door-h);
    transform-style: preserve-3d;
    transform-origin: 50% 50%;
    cursor: pointer;
    pointer-events: auto;

    background:
      linear-gradient(180deg, rgba(20, 12, 36, 0.88) 0%, rgba(30, 16, 48, 0.92) 100%);
    border: 1px solid rgba(200, 168, 255, 0.18);
    border-radius: 6px;
    overflow: hidden;
    backdrop-filter: blur(8px);

    /* Frame glow */
    box-shadow:
      0 0 0 1px rgba(200, 168, 255, 0.05),
      0 0 30px rgba(140, 80, 220, 0.12),
      inset 0 0 60px rgba(200, 168, 255, 0.04);

    transition: box-shadow 0.4s ease, border-color 0.4s ease, filter 0.4s ease;
    backface-visibility: hidden;
  }

  /* Place each door around the pentagon */
  .door.d1 { transform: rotateY(  0deg) translateZ(var(--door-r)); --accent: #c8a8ff; --accent-glow: rgba(200, 168, 255, 0.42); }
  .door.d2 { transform: rotateY( 72deg) translateZ(var(--door-r)); --accent: #ffb8d8; --accent-glow: rgba(255, 184, 216, 0.42); }
  .door.d3 { transform: rotateY(144deg) translateZ(var(--door-r)); --accent: #98e8d0; --accent-glow: rgba(152, 232, 208, 0.42); }
  .door.d4 { transform: rotateY(216deg) translateZ(var(--door-r)); --accent: #ffd888; --accent-glow: rgba(255, 216, 136, 0.42); }
  .door.d5 { transform: rotateY(288deg) translateZ(var(--door-r)); --accent: #88c8ff; --accent-glow: rgba(136, 200, 255, 0.42); }

  .door:hover {
    box-shadow:
      0 0 0 1px var(--accent),
      0 0 40px var(--accent-glow),
      0 0 80px var(--accent-glow),
      inset 0 0 60px rgba(200, 168, 255, 0.08);
    border-color: var(--accent);
  }

  /* Door inner — vertical column layout */
  .door-inner {
    position: absolute;
    inset: 0;
    padding: 28px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .door-num {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--accent);
    opacity: 0.6;
    text-shadow: 0 0 8px var(--accent-glow);
  }
  .door-icon {
    font-size: 90px;
    line-height: 1;
    filter: drop-shadow(0 0 24px var(--accent-glow)) drop-shadow(0 6px 12px rgba(0,0,0,0.5));
    margin-top: 4px;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .door:hover .door-icon {
    transform: translateY(-4px) scale(1.06);
  }
  .door-title-wrap {
    text-align: center;
  }
  .door-zh {
    font-family: "Noto Serif SC", "DM Serif Display", serif;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 0.05em;
    color: #f4f4fc;
    text-shadow: 0 0 16px var(--accent-glow);
  }
  .door-en {
    font-family: "DM Serif Display", serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-top: 4px;
    opacity: 0.85;
  }
  .door-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(232, 232, 240, 0.6);
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(232, 232, 240, 0.15);
    transition: color 0.3s, border-color 0.3s, letter-spacing 0.3s;
  }
  .door:hover .door-cta {
    color: var(--accent);
    border-color: var(--accent);
    letter-spacing: 0.4em;
  }

  /* Decorative corner brackets (sci-fi feel) */
  .door::before, .door::after {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    border: 1px solid var(--accent);
    opacity: 0.6;
    transition: opacity 0.3s, border-color 0.3s;
  }
  .door::before { top: 8px;    left: 8px;   border-right: 0; border-bottom: 0; }
  .door::after  { bottom: 8px; right: 8px;  border-left:  0; border-top:    0; }
  .door:hover::before, .door:hover::after { opacity: 1; }

  /* Subtle scan-line pattern on each door */
  .door-scanlines {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      180deg,
      transparent 0px,
      transparent 2px,
      rgba(200, 168, 255, 0.025) 2px,
      rgba(200, 168, 255, 0.025) 3px
    );
    pointer-events: none;
  }

  /* ─── Centre marker (the 5-pointed star of the polyhedron) ─── */
  .core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 6px;
    background: #c8a8ff;
    border-radius: 50%;
    box-shadow:
      0 0 12px rgba(200, 168, 255, 0.9),
      0 0 28px rgba(200, 168, 255, 0.6),
      0 0 60px rgba(200, 168, 255, 0.3);
    z-index: 2;
    pointer-events: none;
    animation: corePulse 4s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.6; transform: translate(-50%, -50%) scale(1.4); }
  }

  /* ─── Bottom HUD ─── */
  .hud {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(232, 232, 240, 0.4);
    text-transform: uppercase;
    pointer-events: none;
  }
  .hud .hint-key {
    border: 1px solid rgba(232, 232, 240, 0.2);
    padding: 2px 8px;
    border-radius: 3px;
    margin: 0 4px;
    color: rgba(232, 232, 240, 0.7);
  }

  /* ─── Side meta ─── */
  .side-meta {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 10;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(232, 232, 240, 0.35);
    text-transform: uppercase;
    text-align: right;
    pointer-events: none;
    line-height: 1.8;
  }
  .side-meta .row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
  .side-meta .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #c8a8ff;
    box-shadow: 0 0 6px rgba(200, 168, 255, 0.8);
    animation: corePulse 2s ease-in-out infinite;
  }

  /* ─── Door-opening animation when clicked ─── */
  .door.opening {
    animation: doorOpen 0.7s ease-in forwards;
  }
  @keyframes doorOpen {
    0%   { transform: rotateY(var(--y-base, 0deg)) translateZ(var(--door-r)) scale(1); opacity: 1; }
    100% { transform: rotateY(var(--y-base, 0deg)) translateZ(var(--door-r)) scale(2.5); opacity: 0; }
  }

  /* ─── Mobile fallback ─── */
  @media (max-width: 700px) {
    .door {
      --door-w: 220px;
      --door-h: 300px;
      --door-r: 220px;
    }
    .door-icon { font-size: 70px; }
    .door-zh { font-size: 22px; }
  }

  /* ─── Reduced motion ─── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0ms !important;
    }
  }
</style>
</head>
<body>

<!-- Decorative floating shapes in the void -->
<svg class="void-shape s1" viewBox="0 0 100 100">

<div class="stage" id="stage">

<div class="hud">
  <span class="hint-key">DRAG</span> rotate &nbsp;·&nbsp; <span class="hint-key">CLICK</span> enter a room
</div>

<script>
(function () {
  const pentagon = document.getElementById('pentagon');
  const stage    = document.getElementById('stage');

  // Camera-orbit state
  let rotation   = 0;          // degrees
  let velocity   = 0;          // for inertia
  let tilt       = -8;         // base X rotation
  let dragging   = false;
  let lastX      = 0;
  let lastY      = 0;
  let lastTime   = 0;

  // Auto-rotation when idle
  let lastInteractTime = performance.now();
  const IDLE_THRESHOLD_MS = 2500;
  const AUTO_SPEED        = 0.08; // deg per frame

  function applyTransform() {
    pentagon.style.setProperty('--rotation', rotation + 'deg');
    pentagon.style.setProperty('--tilt',     tilt     + 'deg');
  }
  applyTransform();

  function onDragStart(e) {
    if (e.target.closest('.door')) {
      // Allow click on doors to still work — only start drag from empty space.
      // But we want drag-then-click to also work. So we track movement first.
    }
    dragging = true;
    document.documentElement.classList.add('dragging');
    const point = e.touches ? e.touches[0] : e;
    lastX = point.clientX;
    lastY = point.clientY;
    lastTime = performance.now();
    velocity = 0;
  }
  function onDragMove(e) {
    if (!dragging) return;
    const point = e.touches ? e.touches[0] : e;
    const dx = point.clientX - lastX;
    const dy = point.clientY - lastY;
    const now = performance.now();
    const dt = Math.max(now - lastTime, 1);

    rotation += dx * 0.4;
    tilt = Math.max(-30, Math.min(15, tilt - dy * 0.15));
    velocity = (dx * 0.4) / (dt / 16);   // px/16ms ~= deg/frame

    lastX = point.clientX;
    lastY = point.clientY;
    lastTime = now;
    lastInteractTime = now;
    applyTransform();
  }
  function onDragEnd() {
    if (!dragging) return;
    dragging = false;
    document.documentElement.classList.remove('dragging');
  }

  // Mouse
  stage.addEventListener('mousedown', onDragStart);
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup',   onDragEnd);

  // Touch
  stage.addEventListener('touchstart', onDragStart, { passive: true });
  window.addEventListener('touchmove', onDragMove,  { passive: true });
  window.addEventListener('touchend',  onDragEnd);

  // Click handling — short anim then navigate
  document.querySelectorAll('.door').forEach((door) => {
    let mouseDownX = 0, mouseDownY = 0;
    door.addEventListener('mousedown', (e) => {
      mouseDownX = e.clientX;
      mouseDownY = e.clientY;
    });
    door.addEventListener('click', (e) => {
      const dx = Math.abs(e.clientX - mouseDownX);
      const dy = Math.abs(e.clientY - mouseDownY);
      // If they dragged > 5px, treat as drag not click
      if (dx > 5 || dy > 5) {
        e.preventDefault();
        return;
      }
      // Door-opening animation
      e.preventDefault();
      const y = door.dataset.y || '0';
      door.style.setProperty('--y-base', y + 'deg');
      door.classList.add('opening');
      const href = door.href;
      setTimeout(() => {
        window.open(href, '_blank', 'noopener');
        // Restore door after a moment
        setTimeout(() => door.classList.remove('opening'), 800);
      }, 480);
    });
  });

  // Animation loop — inertia + auto-rotate when idle
  function tick() {
    const now = performance.now();
    if (!dragging) {
      // Inertia
      if (Math.abs(velocity) > 0.02) {
        rotation += velocity;
        velocity *= 0.94;
        lastInteractTime = now;
      }
      // Auto-rotate when idle
      else if (now - lastInteractTime > IDLE_THRESHOLD_MS) {
        rotation += AUTO_SPEED;
      }
      // Tilt slowly back to default
      if (Math.abs(tilt - (-8)) > 0.05 && now - lastInteractTime > IDLE_THRESHOLD_MS) {
        tilt += ((-8) - tilt) * 0.02;
      }
      applyTransform();
    }
    requestAnimationFrame(tick);
  }
  tick();

  // Wheel: vertical mouse wheel changes tilt
  stage.addEventListener('wheel', (e) => {
    e.preventDefault();
    tilt = Math.max(-30, Math.min(15, tilt + e.deltaY * 0.05));
    lastInteractTime = performance.now();
    applyTransform();
  }, { passive: false });
})();
</script>
